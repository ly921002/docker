services:
  box64:
    image: ghcr.io/${GHCR_OWNER:-your-github-username}/box64:latest
    container_name: box64
    # Run with host network for better performance with emulated programs
    network_mode: host
    # Required for binfmt_misc registration inside the container
    privileged: true
    environment:
      # DynaRec strong memory mode - recommended for ARM SoCs
      - BOX64_DYNAREC_STRONGMEM=1
      # DynaCache in read-only mode - saves disk space
      - BOX64_DYNACACHE=2
      # Override OpenGL version for some ARM GPUs (Panfrost/Mali)
      # - MESA_GL_VERSION_OVERRIDE=3.2
      # For Panfrost GPU users
      # - PAN_MESA_DEBUG=gl3
      # Skip first N CPU cores to avoid big.LITTLE small cores
      # - BOX64_SKIPCPU=2
    volumes:
      # Mount your x86_64 programs directory
      - ./apps:/root/apps
      # Persistent DynaCache storage
      - ./cache:/root/.cache/box64
      # Mount box64 config file if you have one
      # - ./box64rc:/root/.box64rc
    # To run a specific x86_64 program automatically on startup:
    # command: ["box64", "/root/apps/your-program"]

